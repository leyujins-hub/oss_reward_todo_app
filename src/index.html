<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSS Reward To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="character-box">
        <div class="character">🌱</div>
        <div>
          <h1>울산대 캠퍼스 성장 중</h1>
          <p>과제를 완료하면 캐릭터와 캠퍼스가 성장합니다.</p>
        </div>
      </div>

      <button id="recommendButton" class="recommend-button">
        오늘의 추천 보기
      </button>
    </section>

    <section class="todo-section">
      <h2>오늘의 할 일</h2>

      <form id="todoForm" class="todo-form">
        <input id="todoInput" type="text" placeholder="할 일을 입력하세요" />
        <select id="priorityInput">
          <option value="low">낮음</option>
          <option value="medium">보통</option>
          <option value="high">높음</option>
        </select>
        <button type="submit">추가</button>
      </form>

      <ul id="todoList" class="todo-list"></ul>
    </section>

    <section class="stats-section">
      <h2>완료 현황</h2>
      <p id="completeText">완료한 과제: 0개</p>
    </section>
  </main>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <h3>Adaptive 추천</h3>
      <p>마감일과 중요도를 기준으로 가장 먼저 해야 할 일을 추천합니다.</p>
      <button id="closePopup">닫기</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
